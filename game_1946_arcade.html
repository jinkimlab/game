<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1946 Sky Battle</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top, #17345e 0%, #07111f 55%, #02060b 100%);
      color: #fff;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    #wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 10px;
    }
    canvas {
      border: 3px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.45);
      background: linear-gradient(#5fa6d8 0%, #8fd1ff 35%, #4c95c7 100%);
      max-width: 94vw;
      max-height: 80vh;
    }
    .hud {
      width: 820px;
      max-width: 94vw;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 15px;
      color: #eaf6ff;
    }
    .hint { opacity: 0.9; font-size: 14px; }
  </style>
</head>
<body>
  <div id="wrap">
    <div class="hud">
      <div>조작: ← → ↑ ↓ 이동 / 스페이스 발사 / P 일시정지</div>
      <div>1946 Sky Battle</div>
    </div>
    <canvas id="game" width="820" height="920"></canvas>
    <div class="hint">적을 피하고 격추하세요. 파워업을 먹으면 3발 발사가 됩니다.</div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const W = canvas.width;
    const H = canvas.height;

    const keys = {};
    let gameOver = false;
    let paused = false;
    let frame = 0;
    let bgOffset = 0;
    let messageTimer = 180;

    document.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (e.code === 'KeyP') paused = !paused;
      if (gameOver && e.code === 'Enter') restart();
    });
    document.addEventListener('keyup', e => keys[e.code] = false);

    const player = {
      x: W / 2,
      y: H - 110,
      w: 40,
      h: 56,
      speed: 6,
      hp: 5,
      maxHp: 5,
      cooldown: 0,
      power: 1,
      lives: 3,
      inv: 0,
      score: 0
    };

    const bullets = [];
    const enemies = [];
    const enemyBullets = [];
    const explosions = [];
    const items = [];
    const clouds = Array.from({ length: 10 }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: 18 + Math.random() * 42,
      s: 0.5 + Math.random() * 1.2,
      a: 0.08 + Math.random() * 0.12
    }));

    function restart() {
      player.x = W / 2;
      player.y = H - 110;
      player.hp = 5;
      player.lives = 3;
      player.score = 0;
      player.power = 1;
      player.cooldown = 0;
      player.inv = 0;
      bullets.length = 0;
      enemies.length = 0;
      enemyBullets.length = 0;
      explosions.length = 0;
      items.length = 0;
      frame = 0;
      bgOffset = 0;
      gameOver = false;
      paused = false;
      messageTimer = 180;
    }

    function shoot() {
      if (player.cooldown > 0) return;
      player.cooldown = player.power >= 2 ? 7 : 9;
      if (player.power >= 2) {
        bullets.push({ x: player.x, y: player.y - 24, vx: 0, vy: -11, r: 4 });
        bullets.push({ x: player.x - 16, y: player.y - 16, vx: -1.2, vy: -10.4, r: 4 });
        bullets.push({ x: player.x + 16, y: player.y - 16, vx: 1.2, vy: -10.4, r: 4 });
      } else {
        bullets.push({ x: player.x, y: player.y - 24, vx: 0, vy: -10, r: 4 });
      }
    }

    function spawnEnemy() {
      const roll = Math.random();
      if (roll < 0.7) {
        enemies.push({
          type: 'fighter',
          x: 40 + Math.random() * (W - 80),
          y: -40,
          w: 34,
          h: 42,
          hp: 2,
          speed: 2.5 + Math.random() * 1.7,
          fire: 45 + Math.random() * 60,
          vx: Math.random() < 0.5 ? -0.7 : 0.7,
          score: 100
        });
      } else if (roll < 0.93) {
        enemies.push({
          type: 'bomber',
          x: 60 + Math.random() * (W - 120),
          y: -60,
          w: 56,
          h: 58,
          hp: 7,
          speed: 1.8,
          fire: 70 + Math.random() * 70,
          vx: Math.random() < 0.5 ? -0.4 : 0.4,
          score: 350
        });
      } else {
        enemies.push({
          type: 'ace',
          x: 60 + Math.random() * (W - 120),
          y: -60,
          w: 44,
          h: 52,
          hp: 4,
          speed: 4.2,
          fire: 30 + Math.random() * 40,
          vx: Math.random() < 0.5 ? -1.2 : 1.2,
          score: 220
        });
      }
    }

    function addExplosion(x, y, size = 18, count = 12) {
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = Math.random() * 3 + 1;
        explosions.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 30 + Math.random() * 18, size: Math.random() * size + 3 });
      }
    }

    function dropItem(x, y) {
      if (Math.random() < 0.16) items.push({ x, y, r: 12, vy: 2.2, type: Math.random() < 0.55 ? 'power' : 'heal' });
    }

    function damagePlayer(amount) {
      if (player.inv > 0) return;
      player.hp -= amount;
      player.inv = 90;
      addExplosion(player.x, player.y, 10, 16);
      if (player.hp <= 0) {
        player.lives -= 1;
        if (player.lives > 0) {
          player.hp = player.maxHp;
          player.x = W / 2;
          player.y = H - 110;
          player.inv = 150;
        } else {
          gameOver = true;
          addExplosion(player.x, player.y, 26, 40);
        }
      }
    }

    function update() {
      if (paused || gameOver) return;
      frame++;
      bgOffset += 2;
      if (player.cooldown > 0) player.cooldown--;
      if (player.inv > 0) player.inv--;
      if (messageTimer > 0) messageTimer--;

      if (keys['ArrowLeft']) player.x -= player.speed;
      if (keys['ArrowRight']) player.x += player.speed;
      if (keys['ArrowUp']) player.y -= player.speed;
      if (keys['ArrowDown']) player.y += player.speed;
      if (keys['Space']) shoot();

      player.x = Math.max(24, Math.min(W - 24, player.x));
      player.y = Math.max(60, Math.min(H - 50, player.y));

      if (frame % 30 === 0) spawnEnemy();
      if (frame % 700 === 0 && player.power < 3) player.power++;

      for (const c of clouds) {
        c.y += c.s;
        if (c.y - c.r > H) {
          c.y = -c.r;
          c.x = Math.random() * W;
        }
      }

      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx;
        b.y += b.vy;
        if (b.y < -20) bullets.splice(i, 1);
      }

      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i];
        b.x += b.vx;
        b.y += b.vy;
        if (b.y > H + 20 || b.x < -20 || b.x > W + 20) {
          enemyBullets.splice(i, 1);
          continue;
        }
        if (Math.abs(b.x - player.x) < 18 && Math.abs(b.y - player.y) < 24) {
          enemyBullets.splice(i, 1);
          damagePlayer(1);
        }
      }

      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.y += e.speed;
        e.x += e.vx;
        if (e.x < 28 || e.x > W - 28) e.vx *= -1;
        e.fire--;

        if (e.fire <= 0) {
          e.fire = e.type === 'ace' ? 35 : e.type === 'fighter' ? 70 : 85;
          const dx = player.x - e.x;
          const dy = player.y - e.y;
          const len = Math.hypot(dx, dy) || 1;
          const speed = e.type === 'ace' ? 5.2 : 4.0;
          enemyBullets.push({ x: e.x, y: e.y + 10, vx: dx / len * (speed * 0.6), vy: dy / len * speed, r: e.type === 'bomber' ? 6 : 4 });
          if (e.type === 'bomber') {
            enemyBullets.push({ x: e.x - 10, y: e.y + 8, vx: -1.2, vy: 4.5, r: 4 });
            enemyBullets.push({ x: e.x + 10, y: e.y + 8, vx: 1.2, vy: 4.5, r: 4 });
          }
        }

        if (e.y > H + 80) {
          enemies.splice(i, 1);
          continue;
        }

        if (Math.abs(e.x - player.x) < (e.w + player.w) / 2 - 4 && Math.abs(e.y - player.y) < (e.h + player.h) / 2 - 4) {
          enemies.splice(i, 1);
          addExplosion(e.x, e.y, 18, 18);
          damagePlayer(2);
          continue;
        }

        for (let j = bullets.length - 1; j >= 0; j--) {
          const b = bullets[j];
          if (Math.abs(b.x - e.x) < e.w / 2 && Math.abs(b.y - e.y) < e.h / 2) {
            bullets.splice(j, 1);
            e.hp -= 1;
            addExplosion(b.x, b.y, 5, 6);
            if (e.hp <= 0) {
              player.score += e.score;
              addExplosion(e.x, e.y, e.type === 'bomber' ? 24 : 16, e.type === 'bomber' ? 26 : 14);
              dropItem(e.x, e.y);
              enemies.splice(i, 1);
            }
            break;
          }
        }
      }

      for (let i = items.length - 1; i >= 0; i--) {
        const it = items[i];
        it.y += it.vy;
        if (it.y > H + 20) {
          items.splice(i, 1);
          continue;
        }
        if (Math.abs(it.x - player.x) < 24 && Math.abs(it.y - player.y) < 24) {
          if (it.type === 'power') player.power = Math.min(3, player.power + 1);
          if (it.type === 'heal') player.hp = Math.min(player.maxHp, player.hp + 1);
          items.splice(i, 1);
        }
      }

      for (let i = explosions.length - 1; i >= 0; i--) {
        const p = explosions[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.98;
        p.vy *= 0.98;
        p.life--;
        if (p.life <= 0) explosions.splice(i, 1);
      }
    }

    function drawSea() {
      const y = (bgOffset * 0.6) % 80;
      ctx.save();
      ctx.globalAlpha = 0.18;
      for (let i = -1; i < 14; i++) {
        ctx.fillStyle = i % 2 === 0 ? '#ffffff' : '#d5f1ff';
        ctx.fillRect(0, i * 80 + y, W, 24);
      }
      ctx.restore();
    }

    function drawClouds() {
      for (const c of clouds) {
        ctx.save();
        ctx.globalAlpha = c.a;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
        ctx.arc(c.x + c.r * 0.55, c.y + 3, c.r * 0.75, 0, Math.PI * 2);
        ctx.arc(c.x - c.r * 0.6, c.y + 5, c.r * 0.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawPlayer() {
      const blink = player.inv > 0 && Math.floor(player.inv / 6) % 2 === 0;
      if (blink) return;
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.fillStyle = '#284b63';
      ctx.beginPath();
      ctx.moveTo(0, -28);
      ctx.lineTo(16, 18);
      ctx.lineTo(0, 10);
      ctx.lineTo(-16, 18);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#d9e4ec';
      ctx.beginPath();
      ctx.moveTo(0, -22);
      ctx.lineTo(11, 18);
      ctx.lineTo(0, 12);
      ctx.lineTo(-11, 18);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#c23b22';
      ctx.fillRect(-20, 2, 10, 6);
      ctx.fillRect(10, 2, 10, 6);
      ctx.fillRect(-5, -14, 10, 18);
      ctx.restore();
    }

    function drawEnemy(e) {
      ctx.save();
      ctx.translate(e.x, e.y);
      if (e.type === 'fighter') {
        ctx.fillStyle = '#4b5d16';
        ctx.beginPath();
        ctx.moveTo(0, 22);
        ctx.lineTo(14, -18);
        ctx.lineTo(0, -8);
        ctx.lineTo(-14, -18);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#d4b04a';
        ctx.fillRect(-3, -8, 6, 18);
      } else if (e.type === 'bomber') {
        ctx.fillStyle = '#6b3d2e';
        ctx.fillRect(-24, -18, 48, 36);
        ctx.fillStyle = '#b56d45';
        ctx.fillRect(-10, -26, 20, 52);
        ctx.fillStyle = '#222';
        ctx.fillRect(-28, -6, 56, 12);
      } else {
        ctx.fillStyle = '#3b215d';
        ctx.beginPath();
        ctx.moveTo(0, 24);
        ctx.lineTo(18, -20);
        ctx.lineTo(0, -6);
        ctx.lineTo(-18, -20);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#ffb703';
        ctx.fillRect(-4, -10, 8, 22);
      }
      ctx.restore();
    }

    function drawHUD() {
      ctx.save();
      ctx.fillStyle = 'rgba(5, 16, 28, 0.45)';
      ctx.fillRect(16, 16, 250, 96);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 24px Arial';
      ctx.fillText('SCORE  ' + player.score.toString().padStart(6, '0'), 26, 48);
      ctx.font = '18px Arial';
      ctx.fillText('LIVES: ' + player.lives, 26, 76);
      ctx.fillText('POWER: ' + player.power, 132, 76);
      ctx.fillText('HP', 26, 102);
      ctx.strokeStyle = '#fff';
      ctx.strokeRect(62, 88, 150, 14);
      ctx.fillStyle = '#ff5d5d';
      ctx.fillRect(62, 88, 150 * (player.hp / player.maxHp), 14);
      ctx.restore();
    }

    function drawBullets() {
      ctx.fillStyle = '#fff9c4';
      for (const b of bullets) {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = '#ff784f';
      for (const b of enemyBullets) {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawItems() {
      for (const it of items) {
        ctx.save();
        ctx.translate(it.x, it.y);
        ctx.fillStyle = it.type === 'power' ? '#ffd166' : '#7ae582';
        ctx.beginPath();
        ctx.arc(0, 0, it.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#17324d';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(it.type === 'power' ? 'P' : 'H', 0, 1);
        ctx.restore();
      }
    }

    function drawExplosions() {
      for (const p of explosions) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life / 48);
        ctx.fillStyle = p.life > 18 ? '#ffb703' : '#ff5d5d';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * (p.life / 40), 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawOverlay() {
      if (paused) {
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.font = 'bold 56px Arial';
        ctx.fillText('PAUSED', W / 2, H / 2);
      }
      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.58)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.font = 'bold 60px Arial';
        ctx.fillText('GAME OVER', W / 2, H / 2 - 30);
        ctx.font = '28px Arial';
        ctx.fillText('최종 점수: ' + player.score, W / 2, H / 2 + 18);
        ctx.font = '22px Arial';
        ctx.fillText('Enter 키를 누르면 다시 시작합니다', W / 2, H / 2 + 64);
      }
      if (messageTimer > 0) {
        ctx.save();
        ctx.globalAlpha = Math.min(1, messageTimer / 70);
        ctx.fillStyle = 'rgba(0,0,0,0.28)';
        ctx.fillRect(W / 2 - 200, H - 150, 400, 54);
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.font = '22px Arial';
        ctx.fillText('1946 전투기 출격!', W / 2, H - 116);
        ctx.restore();
      }
    }

    function render() {
      ctx.clearRect(0, 0, W, H);
      drawSea();
      drawClouds();
      drawItems();
      drawBullets();
      for (const e of enemies) drawEnemy(e);
      drawPlayer();
      drawExplosions();
      drawHUD();
      drawOverlay();
    }

    function loop() {
      update();
      render();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
