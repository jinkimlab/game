<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1942 Arcade</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #07131f; color: #fff; font-family: Arial, sans-serif; overflow: hidden; }
    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      background: radial-gradient(circle at top, #1e5a8a 0%, #0a2740 40%, #030913 100%);
    }
    .topbar {
      width: 760px;
      max-width: 95vw;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #dff3ff;
    }
    canvas {
      width: min(760px, 95vw);
      height: auto;
      border: 3px solid rgba(255,255,255,.18);
      border-radius: 14px;
      box-shadow: 0 14px 50px rgba(0,0,0,.45);
      background: linear-gradient(#78c7ff 0%, #5db1ea 35%, #3c87bd 100%);
    }
    .help { font-size: 13px; color: #dbefff; opacity: .95; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>이동: ← → ↑ ↓ / 발사: Space / 폭탄: B / 일시정지: P</div>
    <div>1942 Arcade</div>
  </div>
  <canvas id="game" width="760" height="900"></canvas>
  <div class="help">적 편대를 격추하고 아이템을 먹으세요. Enter로 재시작합니다.</div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const keys = {};
let frame = 0;
let paused = false;
let gameOver = false;
let bgY = 0;
let stage = 1;
let stageTimer = 0;

addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyP') paused = !paused;
  if (gameOver && e.code === 'Enter') resetGame();
});
addEventListener('keyup', e => keys[e.code] = false);

const player = {
  x: W / 2,
  y: H - 110,
  w: 34,
  h: 54,
  speed: 5.2,
  hp: 5,
  maxHp: 5,
  lives: 3,
  bombs: 3,
  cooldown: 0,
  spread: 1,
  inv: 0,
  score: 0
};

const bullets = [];
const enemies = [];
const enemyBullets = [];
const particles = [];
const items = [];
const islands = [];

for (let i = 0; i < 7; i++) {
  islands.push({
    x: 80 + Math.random() * (W - 160),
    y: Math.random() * H,
    r: 25 + Math.random() * 45,
    speed: 1.2 + Math.random() * 1.1
  });
}

function resetGame() {
  player.x = W / 2;
  player.y = H - 110;
  player.hp = 5;
  player.lives = 3;
  player.bombs = 3;
  player.cooldown = 0;
  player.spread = 1;
  player.inv = 0;
  player.score = 0;
  bullets.length = 0;
  enemies.length = 0;
  enemyBullets.length = 0;
  particles.length = 0;
  items.length = 0;
  frame = 0;
  bgY = 0;
  stage = 1;
  stageTimer = 0;
  paused = false;
  gameOver = false;
}

function spawnParticle(x, y, n = 14, speed = 3, life = 34) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * speed + 0.8;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: life + Math.random()*12, size: 2 + Math.random()*5 });
  }
}

function shoot() {
  if (player.cooldown > 0) return;
  player.cooldown = player.spread >= 2 ? 7 : 9;
  bullets.push({ x: player.x, y: player.y - 24, vx: 0, vy: -10, r: 4 });
  if (player.spread >= 2) {
    bullets.push({ x: player.x - 12, y: player.y - 18, vx: -1.3, vy: -9.6, r: 4 });
    bullets.push({ x: player.x + 12, y: player.y - 18, vx: 1.3, vy: -9.6, r: 4 });
  }
  if (player.spread >= 3) {
    bullets.push({ x: player.x - 22, y: player.y - 10, vx: -2.2, vy: -9.2, r: 4 });
    bullets.push({ x: player.x + 22, y: player.y - 10, vx: 2.2, vy: -9.2, r: 4 });
  }
}

function useBomb() {
  if (player.bombs <= 0) return;
  player.bombs--;
  spawnParticle(player.x, player.y, 45, 6, 44);
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    player.score += e.score;
    if (Math.random() < 0.15) dropItem(e.x, e.y);
    spawnParticle(e.x, e.y, 20, 4, 32);
    enemies.splice(i, 1);
  }
  enemyBullets.length = 0;
}

function dropItem(x, y) {
  const t = Math.random();
  let type = 'score';
  if (t < 0.34) type = 'spread';
  else if (t < 0.58) type = 'heal';
  else if (t < 0.74) type = 'bomb';
  items.push({ x, y, vy: 1.9, r: 12, type });
}

function spawnWave() {
  const roll = Math.random();
  const center = 80 + Math.random() * (W - 160);
  if (roll < 0.5) {
    for (let i = 0; i < 5; i++) {
      enemies.push({
        type: 'green',
        x: center + (i - 2) * 52,
        y: -50 - i * 30,
        w: 30,
        h: 36,
        hp: 2,
        speed: 2.2 + stage * 0.12,
        vx: (i - 2) * 0.24,
        fire: 55 + Math.random() * 50,
        score: 100,
        wave: 'line'
      });
    }
  } else if (roll < 0.85) {
    for (let i = 0; i < 6; i++) {
      enemies.push({
        type: 'silver',
        x: i % 2 === 0 ? -40 : W + 40,
        y: 70 + i * 28,
        w: 30,
        h: 36,
        hp: 2,
        speed: 2.8 + stage * 0.15,
        vx: i % 2 === 0 ? 2.2 : -2.2,
        fire: 60 + Math.random() * 50,
        score: 120,
        wave: 'cross'
      });
    }
  } else {
    enemies.push({
      type: 'bomber',
      x: 100 + Math.random() * (W - 200),
      y: -80,
      w: 58,
      h: 66,
      hp: 12 + stage,
      speed: 1.6 + stage * 0.06,
      vx: Math.random() < 0.5 ? -0.7 : 0.7,
      fire: 38,
      score: 500,
      wave: 'heavy'
    });
  }
}

function playerHit(dmg) {
  if (player.inv > 0) return;
  player.hp -= dmg;
  player.inv = 110;
  spawnParticle(player.x, player.y, 18, 3.6, 28);
  if (player.hp <= 0) {
    player.lives--;
    if (player.lives <= 0) {
      gameOver = true;
      spawnParticle(player.x, player.y, 44, 5.4, 46);
    } else {
      player.hp = player.maxHp;
      player.x = W / 2;
      player.y = H - 110;
      player.inv = 160;
    }
  }
}

function update() {
  if (paused || gameOver) return;
  frame++;
  stageTimer++;
  bgY += 2;
  if (player.cooldown > 0) player.cooldown--;
  if (player.inv > 0) player.inv--;
  if (stageTimer % 900 === 0) stage++;

  if (keys['ArrowLeft']) player.x -= player.speed;
  if (keys['ArrowRight']) player.x += player.speed;
  if (keys['ArrowUp']) player.y -= player.speed;
  if (keys['ArrowDown']) player.y += player.speed;
  if (keys['Space']) shoot();
  if (keys['KeyB']) { keys['KeyB'] = false; useBomb(); }

  player.x = Math.max(24, Math.min(W - 24, player.x));
  player.y = Math.max(60, Math.min(H - 44, player.y));

  if (frame % Math.max(18, 42 - stage) === 0) spawnWave();

  for (const isl of islands) {
    isl.y += isl.speed;
    if (isl.y - isl.r > H) {
      isl.y = -isl.r - Math.random() * 100;
      isl.x = 80 + Math.random() * (W - 160);
      isl.r = 25 + Math.random() * 45;
    }
  }

  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx; b.y += b.vy;
    if (b.y < -20 || b.x < -20 || b.x > W + 20) bullets.splice(i, 1);
  }

  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx; b.y += b.vy;
    if (b.y > H + 20 || b.x < -20 || b.x > W + 20) { enemyBullets.splice(i, 1); continue; }
    if (Math.abs(b.x - player.x) < 16 && Math.abs(b.y - player.y) < 24) {
      enemyBullets.splice(i, 1);
      playerHit(1);
    }
  }

  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.y += e.speed;
    e.x += e.vx;
    if (e.type === 'bomber') {
      if (e.x < 70 || e.x > W - 70) e.vx *= -1;
    }
    e.fire--;

    if (e.fire <= 0) {
      if (e.type === 'bomber') {
        enemyBullets.push({ x: e.x, y: e.y + 12, vx: 0, vy: 4.5, r: 6 });
        enemyBullets.push({ x: e.x - 16, y: e.y + 8, vx: -1.2, vy: 4.1, r: 4 });
        enemyBullets.push({ x: e.x + 16, y: e.y + 8, vx: 1.2, vy: 4.1, r: 4 });
        e.fire = Math.max(24, 48 - stage);
      } else {
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const len = Math.hypot(dx, dy) || 1;
        enemyBullets.push({ x: e.x, y: e.y + 8, vx: dx / len * 2.1, vy: dy / len * 3.8, r: 4 });
        e.fire = 70 + Math.random() * 35;
      }
    }

    if (e.y > H + 100 || e.x < -100 || e.x > W + 100) { enemies.splice(i, 1); continue; }

    if (Math.abs(e.x - player.x) < (e.w + player.w) / 2 - 3 && Math.abs(e.y - player.y) < (e.h + player.h) / 2 - 3) {
      enemies.splice(i, 1);
      spawnParticle(e.x, e.y, 20, 4.4, 30);
      playerHit(2);
      continue;
    }

    for (let j = bullets.length - 1; j >= 0; j--) {
      const b = bullets[j];
      if (Math.abs(b.x - e.x) < e.w / 2 && Math.abs(b.y - e.y) < e.h / 2) {
        bullets.splice(j, 1);
        e.hp -= 1;
        spawnParticle(b.x, b.y, 6, 2.1, 18);
        if (e.hp <= 0) {
          player.score += e.score;
          if (Math.random() < 0.18) dropItem(e.x, e.y);
          spawnParticle(e.x, e.y, e.type === 'bomber' ? 30 : 14, e.type === 'bomber' ? 5 : 3, 30);
          enemies.splice(i, 1);
        }
        break;
      }
    }
  }

  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    it.y += it.vy;
    if (it.y > H + 20) { items.splice(i, 1); continue; }
    if (Math.abs(it.x - player.x) < 24 && Math.abs(it.y - player.y) < 24) {
      if (it.type === 'spread') player.spread = Math.min(3, player.spread + 1);
      if (it.type === 'heal') player.hp = Math.min(player.maxHp, player.hp + 1);
      if (it.type === 'bomb') player.bombs = Math.min(6, player.bombs + 1);
      if (it.type === 'score') player.score += 300;
      items.splice(i, 1);
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vx *= 0.985; p.vy *= 0.985; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawOcean() {
  const stripe = (bgY * 0.7) % 100;
  ctx.fillStyle = '#67b7eb';
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 0.16;
  for (let i = -1; i < 12; i++) {
    ctx.fillStyle = i % 2 === 0 ? '#dff8ff' : '#bde9ff';
    ctx.fillRect(0, i * 100 + stripe, W, 28);
  }
  ctx.globalAlpha = 1;
}

function drawIslands() {
  for (const isl of islands) {
    ctx.save();
    ctx.translate(isl.x, isl.y);
    ctx.fillStyle = '#d9c48a';
    ctx.beginPath();
    ctx.ellipse(0, 0, isl.r, isl.r * 0.62, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#4f8d3a';
    ctx.beginPath();
    ctx.ellipse(-isl.r * 0.1, -4, isl.r * 0.75, isl.r * 0.38, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawPlayer() {
  if (player.inv > 0 && Math.floor(player.inv / 6) % 2 === 0) return;
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.fillStyle = '#304d63';
  ctx.beginPath();
  ctx.moveTo(0, -27);
  ctx.lineTo(15, 20);
  ctx.lineTo(0, 10);
  ctx.lineTo(-15, 20);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#e7eef5';
  ctx.beginPath();
  ctx.moveTo(0, -21);
  ctx.lineTo(10, 18);
  ctx.lineTo(0, 12);
  ctx.lineTo(-10, 18);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#d94343';
  ctx.fillRect(-18, 0, 8, 6);
  ctx.fillRect(10, 0, 8, 6);
  ctx.fillRect(-4, -12, 8, 16);
  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  if (e.type === 'green') {
    ctx.fillStyle = '#3b6b28';
    ctx.beginPath();
    ctx.moveTo(0, 18); ctx.lineTo(14, -16); ctx.lineTo(0, -8); ctx.lineTo(-14, -16); ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#f1c453';
    ctx.fillRect(-3, -8, 6, 14);
  } else if (e.type === 'silver') {
    ctx.fillStyle = '#6a727d';
    ctx.beginPath();
    ctx.moveTo(0, 18); ctx.lineTo(13, -14); ctx.lineTo(0, -4); ctx.lineTo(-13, -14); ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#d7e2ea';
    ctx.fillRect(-3, -6, 6, 12);
  } else {
    ctx.fillStyle = '#6f4b34';
    ctx.fillRect(-24, -18, 48, 36);
    ctx.fillStyle = '#a6734d';
    ctx.fillRect(-8, -28, 16, 56);
    ctx.fillStyle = '#222a33';
    ctx.fillRect(-28, -5, 56, 10);
  }
  ctx.restore();
}

function drawBullets() {
  ctx.fillStyle = '#fff3b0';
  for (const b of bullets) {
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.fillStyle = '#ff784f';
  for (const b of enemyBullets) {
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
  }
}

function drawItems() {
  for (const it of items) {
    ctx.save(); ctx.translate(it.x, it.y);
    const map = { spread: '#ffd166', heal: '#7ae582', bomb: '#f28482', score: '#9bf6ff' };
    const label = { spread: 'S', heal: 'H', bomb: 'B', score: '$' };
    ctx.fillStyle = map[it.type];
    ctx.beginPath(); ctx.arc(0, 0, it.r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#17324d';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = 'bold 14px Arial';
    ctx.fillText(label[it.type], 0, 1);
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life / 42);
    ctx.fillStyle = p.life > 18 ? '#ffd166' : '#ff7b54';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * (p.life / 30), 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  ctx.fillStyle = 'rgba(7, 19, 31, .42)';
  ctx.fillRect(14, 14, 280, 108);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 24px Arial';
  ctx.fillText('SCORE ' + String(player.score).padStart(6, '0'), 24, 44);
  ctx.font = '18px Arial';
  ctx.fillText('STAGE: ' + stage, 24, 72);
  ctx.fillText('LIVES: ' + player.lives, 120, 72);
  ctx.fillText('BOMBS: ' + player.bombs, 210, 72);
  ctx.fillText('HP', 24, 101);
  ctx.strokeStyle = '#fff';
  ctx.strokeRect(58, 88, 180, 14);
  ctx.fillStyle = '#ff5d5d';
  ctx.fillRect(58, 88, 180 * (player.hp / player.maxHp), 14);
}

function drawOverlay() {
  if (frame < 140 && !gameOver) {
    ctx.globalAlpha = Math.min(1, (140 - frame) / 70);
    ctx.fillStyle = 'rgba(0,0,0,.24)';
    ctx.fillRect(W/2 - 210, H - 145, 420, 52);
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.font = '24px Arial';
    ctx.fillText('1942 전투 출격!', W/2, H - 111);
    ctx.globalAlpha = 1;
  }
  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,.42)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = 'bold 56px Arial';
    ctx.fillText('PAUSED', W/2, H/2);
  }
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,.55)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
    ctx.font = 'bold 58px Arial'; ctx.fillText('GAME OVER', W/2, H/2 - 30);
    ctx.font = '28px Arial'; ctx.fillText('최종 점수: ' + player.score, W/2, H/2 + 15);
    ctx.font = '22px Arial'; ctx.fillText('Enter 키로 다시 시작', W/2, H/2 + 58);
  }
}

function render() {
  ctx.clearRect(0, 0, W, H);
  drawOcean();
  drawIslands();
  drawItems();
  drawBullets();
  for (const e of enemies) drawEnemy(e);
  drawPlayer();
  drawParticles();
  drawHUD();
  drawOverlay();
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
