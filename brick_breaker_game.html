<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>벽돌깨기 게임</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .wrap { text-align: center; }
    h1 { margin: 0 0 12px; font-size: 28px; }
    p { margin: 8px 0 16px; color: #ccc; }
    canvas {
      background: #000;
      border: 2px solid #555;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(255,255,255,0.08);
      display: block;
      margin: 0 auto;
    }
    .info { margin-top: 12px; font-size: 14px; color: #bbb; }
    .btns { margin-top: 14px; }
    button {
      background: #2d7ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      margin: 0 6px;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>벽돌깨기 게임</h1>
    <p>← → 방향키로 이동 / 스페이스바로 시작</p>
    <canvas id="game" width="800" height="520"></canvas>
    <div class="btns">
      <button onclick="startGame()">시작 / 다시시작</button>
    </div>
    <div class="info">벽돌을 모두 깨면 승리합니다. 공을 3번 놓치면 게임 오버입니다.</div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const paddle = {
      width: 120,
      height: 14,
      x: canvas.width / 2 - 60,
      y: canvas.height - 36,
      speed: 8,
      dx: 0
    };

    const ball = {
      x: canvas.width / 2,
      y: canvas.height - 60,
      radius: 10,
      dx: 4,
      dy: -4
    };

    const brick = {
      rowCount: 6,
      colCount: 10,
      width: 68,
      height: 22,
      padding: 10,
      offsetTop: 60,
      offsetLeft: 24
    };

    let bricks = [];
    let score = 0;
    let lives = 3;
    let gameRunning = false;
    let gameOver = false;
    let win = false;

    function buildBricks() {
      bricks = [];
      for (let c = 0; c < brick.colCount; c++) {
        bricks[c] = [];
        for (let r = 0; r < brick.rowCount; r++) {
          bricks[c][r] = { x: 0, y: 0, status: 1 };
        }
      }
    }

    function resetBallAndPaddle() {
      paddle.x = canvas.width / 2 - paddle.width / 2;
      ball.x = canvas.width / 2;
      ball.y = canvas.height - 60;
      ball.dx = 4 * (Math.random() > 0.5 ? 1 : -1);
      ball.dy = -4;
    }

    function startGame() {
      score = 0;
      lives = 3;
      gameOver = false;
      win = false;
      gameRunning = true;
      buildBricks();
      resetBallAndPaddle();
      draw();
    }

    function drawPaddle() {
      ctx.fillStyle = '#00d1ff';
      ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
    }

    function drawBall() {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fillStyle = '#ffd54a';
      ctx.fill();
      ctx.closePath();
    }

    function drawBricks() {
      const colors = ['#ff6b6b','#ff9f43','#feca57','#1dd1a1','#54a0ff','#a29bfe'];
      for (let c = 0; c < brick.colCount; c++) {
        for (let r = 0; r < brick.rowCount; r++) {
          if (bricks[c][r].status === 1) {
            const brickX = c * (brick.width + brick.padding) + brick.offsetLeft;
            const brickY = r * (brick.height + brick.padding) + brick.offsetTop;
            bricks[c][r].x = brickX;
            bricks[c][r].y = brickY;
            ctx.fillStyle = colors[r % colors.length];
            ctx.fillRect(brickX, brickY, brick.width, brick.height);
          }
        }
      }
    }

    function drawHUD() {
      ctx.fillStyle = '#fff';
      ctx.font = '18px Arial';
      ctx.fillText('점수: ' + score, 20, 30);
      ctx.fillText('목숨: ' + lives, canvas.width - 90, 30);
    }

    function drawCenterMessage(title, sub) {
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 42px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 20);
      ctx.font = '20px Arial';
      ctx.fillText(sub, canvas.width / 2, canvas.height / 2 + 24);
      ctx.textAlign = 'left';
    }

    function movePaddle() {
      paddle.x += paddle.dx;
      if (paddle.x < 0) paddle.x = 0;
      if (paddle.x + paddle.width > canvas.width) {
        paddle.x = canvas.width - paddle.width;
      }
    }

    function moveBall() {
      ball.x += ball.dx;
      ball.y += ball.dy;

      if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
        ball.dx *= -1;
      }
      if (ball.y - ball.radius < 0) {
        ball.dy *= -1;
      }

      if (
        ball.y + ball.radius >= paddle.y &&
        ball.x > paddle.x &&
        ball.x < paddle.x + paddle.width
      ) {
        let hitPoint = (ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
        ball.dx = hitPoint * 6;
        ball.dy = -Math.abs(ball.dy);
      }

      if (ball.y + ball.radius > canvas.height) {
        lives--;
        if (lives <= 0) {
          gameOver = true;
          gameRunning = false;
        } else {
          resetBallAndPaddle();
          gameRunning = false;
        }
      }
    }

    function collisionDetection() {
      for (let c = 0; c < brick.colCount; c++) {
        for (let r = 0; r < brick.rowCount; r++) {
          let b = bricks[c][r];
          if (b.status === 1) {
            if (
              ball.x > b.x &&
              ball.x < b.x + brick.width &&
              ball.y > b.y &&
              ball.y < b.y + brick.height
            ) {
              ball.dy *= -1;
              b.status = 0;
              score++;
              if (score === brick.rowCount * brick.colCount) {
                win = true;
                gameRunning = false;
              }
            }
          }
        }
      }
    }

    function drawBackground() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      grad.addColorStop(0, '#0a0f1f');
      grad.addColorStop(1, '#111');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function draw() {
      drawBackground();
      drawBricks();
      drawPaddle();
      drawBall();
      drawHUD();

      if (!gameRunning && !gameOver && !win) {
        drawCenterMessage('스페이스바를 누르세요', '공을 다시 출발시킵니다');
      }
      if (gameOver) {
        drawCenterMessage('게임 오버', '버튼을 눌러 다시 시작하세요');
      }
      if (win) {
        drawCenterMessage('승리!', '모든 벽돌을 깼습니다');
      }
    }

    function update() {
      if (gameRunning) {
        movePaddle();
        moveBall();
        collisionDetection();
      }
      draw();
      requestAnimationFrame(update);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Right' || e.key === 'ArrowRight') {
        paddle.dx = paddle.speed;
      } else if (e.key === 'Left' || e.key === 'ArrowLeft') {
        paddle.dx = -paddle.speed;
      } else if (e.code === 'Space') {
        if (!gameOver && !win) gameRunning = true;
      }
    });

    document.addEventListener('keyup', (e) => {
      if (
        e.key === 'Right' || e.key === 'ArrowRight' ||
        e.key === 'Left' || e.key === 'ArrowLeft'
      ) {
        paddle.dx = 0;
      }
    });

    buildBricks();
    draw();
    update();
  </script>
</body>
</html>
